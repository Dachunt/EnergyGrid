name: CD Deploy to AWS

on:
  push:
    branches: [main, master]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 107901884265.dkr.ecr.us-east-1.amazonaws.com
  PROJECT: energygrid

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          aws ecr get-login-password --region $AWS_REGION |
            docker login --username AWS --password-stdin $ECR_REGISTRY
      - run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$PROJECT-backend:latest ./backend && docker push $ECR_REGISTRY/$PROJECT-backend:latest
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$PROJECT-frontend:latest ./frontend && docker push $ECR_REGISTRY/$PROJECT-frontend:latest
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$PROJECT-simulator:latest ./simulator && docker push $ECR_REGISTRY/$PROJECT-simulator:latest
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$PROJECT-nginx:latest ./docker/nginx && docker push $ECR_REGISTRY/$PROJECT-nginx:latest
          docker build --platform linux/amd64 -t $ECR_REGISTRY/$PROJECT-munin-master:latest ./docker/munin-master && docker push $ECR_REGISTRY/$PROJECT-munin-master:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Inject SSH key via EC2 Instance Connect
        run: |
          ssh-keygen -t rsa -b 2048 -f /tmp/deploy_key -N "" -q
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,values=energygrid-prod-ec2" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          AZ=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].Placement.AvailabilityZone" \
            --output text)
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id "$INSTANCE_ID" \
            --availability-zone "$AZ" \
            --instance-os-user ec2-user \
            --ssh-public-key file:///tmp/deploy_key.pub
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      - name: Upload files and restart services
        run: |
          scp -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            docker-compose.yml ec2-user@98.91.49.34:/opt/energygrid/
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ec2-user@98.91.49.34 \
            bash /opt/energygrid/start.sh
