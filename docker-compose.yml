networks:
  energygrid-net:
    driver: bridge

volumes:
  energygrid-db-data:
  energygrid-logs:
  energygrid-spike-logs:
  energygrid-alert-logs:
  munin-rrd:
  munin-html:

services:
  energygrid-db:
    image: postgres:15-alpine
    container_name: ENERGYGRID-DB
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - energygrid-db-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "pg_stat_statements.track=all"
    networks:
      - energygrid-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  energygrid-redis:
    image: redis:7-alpine
    container_name: ENERGYGRID-REDIS
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - energygrid-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  energygrid-backend:
    build: ./backend
    restart: on-failure:5
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: energygrid-db
      POSTGRES_PORT: ${POSTGRES_PORT}
      SIMULATOR_URL: http://energygrid-simulator:8001
      MUNIN_MASTER_URL: http://munin-master:8080
      PINGDOM_API_TOKEN: ${PINGDOM_API_TOKEN}
      PINGDOM_EMAIL: ${PINGDOM_EMAIL}
      REDIS_URL: redis://energygrid-redis:6379
    expose:
      - "8000"
      - "4949"
    volumes:
      - energygrid-logs:/app/logs
      - energygrid-spike-logs:/app/logs/spikes
      - energygrid-alert-logs:/app/logs/alertas
    networks:
      - energygrid-net
    depends_on:
      energygrid-db:
        condition: service_healthy
      energygrid-redis:
        condition: service_started

  energygrid-nginx:
    build: ./docker/nginx
    container_name: ENERGYGRID-NGINX
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT}:8000"
    networks:
      - energygrid-net
    depends_on:
      - energygrid-backend

  energygrid-frontend:
    build: ./frontend
    container_name: ENERGYGRID-FRONTEND
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - energygrid-net
    depends_on:
      - energygrid-backend

  energygrid-simulator:
    build: ./simulator
    container_name: ENERGYGRID-SIMULATOR
    restart: unless-stopped
    environment:
      BACKEND_URL: http://energygrid-backend:8000
      INTERVAL_MS: ${SIMULATOR_INTERVAL_MS}
    expose:
      - "8001"
    networks:
      - energygrid-net
    depends_on:
      - energygrid-backend

  munin-master:
    build: ./docker/munin-master
    container_name: ENERGYGRID-MUNIN-MASTER
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - munin-rrd:/var/lib/munin
      - munin-html:/var/www/munin
    networks:
      - energygrid-net
    depends_on:
      - energygrid-backend
